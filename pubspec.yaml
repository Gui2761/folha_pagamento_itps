name: folha_pagamento_itps
description: Sistema de calculo de convenio ITPS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Banco de dados local para Windows
  sqflite_common_ffi: ^2.3.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.1
  path: ^1.8.3
  # Gerenciamento de estado simples
  provider: ^6.0.5
  # Formatação de moeda (R$)
  intl: ^0.18.1
  pdf: ^3.10.4
  printing: ^5.11.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true